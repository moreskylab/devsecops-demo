apiVersion: v1
kind: Namespace
metadata:
  name: local-observability
---
# ==========================================
# CONFIGURATIONS & SECRETS
# ==========================================
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: local-observability
type: Opaque
stringData:
  # Points directly to our local postgres service name
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/postgres"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-env-config
  namespace: local-observability
data:
  ALLOWED_ORIGIN: "*"
  WEB_CONCURRENCY: "1"
  PORT: "8000"
  ENABLE_OBSERVABILITY: "false" # Disabled to drop Alloy/LGTM requirements locally
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-env-config
  namespace: local-observability
data:
  VITE_ENABLE_TRACKING: "false"
  VITE_APP_VERSION: "1.0.0-local"
  VITE_API_BASE_URL: "http://localhost"
---
# ==========================================
# LOCAL STATELESS POSTGRES
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: local-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              value: "postgres"
            - name: POSTGRES_DB
              value: "postgres"
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: local-db-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: local-db-data
          emptyDir: {} # Scratch space that doesn't need cloud volumes
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: local-observability
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
# ==========================================
# APPLICATION: BACKEND WORKLOAD
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: local-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: docker.io/moreskylab/backend:1.0.0
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DATABASE_URL
          envFrom:
            - configMapRef:
                name: backend-env-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: local-observability
spec:
  ports:
    - port: 8000
      targetPort: 8000
  selector:
    app: backend
---
# ==========================================
# APPLICATION: FRONTEND WORKLOAD
# ==========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: local-observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/moreskylab/frontend:1.0.0
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          envFrom:
            - configMapRef:
                name: frontend-env-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: local-observability
spec:
  ports:
    - port: 8080
      targetPort: 8080
  selector:
    app: frontend
---
# ==========================================
# STANDARD INGRESS FOR LOCAL ROUTING
# ==========================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: local-ingress
  namespace: local-observability
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          # Routes http://localhost/api to the backend
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 8000
          # Routes http://localhost/ to the frontend
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 8080