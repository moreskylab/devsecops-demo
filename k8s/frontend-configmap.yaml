apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: default
  labels:
    app.kubernetes.io/part-of: frontend
data:
  default.conf.template: |
    server {
        # Evaluated at runtime from the pod spec container environment variables
        listen ${PORT};
        server_name localhost;

        server_tokens off;

        # Static Application Asset Serving
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        }

        # Optimized caching for fingerprinted build assets
        location /assets/ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable, max-age=31536000";
        }

        # Liveness & Readiness Probing Endpoint
        location /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'OK';
        }

        # Clean isolation matrix
        error_page 400 401 403 404 500 502 503 504 /error.html;
        location = /error.html {
            root   /usr/share/nginx/html;
            internal;
        }
    }
