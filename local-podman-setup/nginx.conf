events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 8080;
        server_name localhost;

        # 1. Static asset server hosting compiled frontend files (Vite output dist folder)
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # 2. Ingress API Proxying to your FastAPI application
        location /api {
            rewrite ^/api(.*)$ $1 break; 
            proxy_pass http://localhost:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Telemetry Gateway Proxying for Frontend browser distributed spans
        location /v1/traces {
            proxy_pass http://localhost:4318/v1/traces;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
