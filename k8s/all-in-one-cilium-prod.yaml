apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    kubernetes.io/metadata.name: observability
---
# ==============================================================================
# CERTIFICATE MANAGEMENT (Production TLS)
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: observability-tls-cert
  namespace: observability
type: kubernetes.io/tls
stringData:
  # In production, this is managed automatically by cert-manager via Let's Encrypt
  tls.crt: |
    -----BEGIN CERTIFICATE-----
    MIICXAIBAAKBgQCr7... (Your Production Certificate)
    -----END CERTIFICATE-----
  tls.key: |
    -----BEGIN RSA PRIVATE KEY-----
    MIICXAIBAAKBgQCr7... (Your Production Private Key)
    -----END RSA PRIVATE KEY-----
---
# ==============================================================================
# HARDENED CILIUM SECURITY POLICIES
# ==============================================================================
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: observability-core-rules
  namespace: observability
spec:
  endpointSelector: {}
  ingress:
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": observability
    # Strict DNS resolution limiting
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
          rules:
            dns:
              - matchPattern: "*.observability.svc.cluster.local"
              - matchPattern: "postgres.observability.svc.cluster.local"
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: egress-fqdn-whitelist
  namespace: observability
spec:
  endpointSelector:
    matchLabels:
      app: alloy
  egress:
    # Restrict Alloy agent to only push metrics to your valid corporate domains
    - toFQDNs:
        - matchName: "observability.example.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: app-gateway-ingress
  namespace: observability
spec:
  endpointSelector:
    matchExpressions:
      - key: app
        operator: In
        values: [frontend, backend]
  ingress:
    # Accept traffic strictly from the Envoy Ingress gateway namespace
    - fromEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": envoy-gateway-system
---
# ==============================================================================
# STORAGE & CONFIGURATIONS
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: observability
type: Opaque
stringData:
  POSTGRES_USER: "observability_admin"
  POSTGRES_PASSWORD: "SuperSecureProductionPassword101!" 
  POSTGRES_DB: "metrics_metadata"
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: observability
type: Opaque
stringData:
  DATABASE_URL: "postgresql://observability_admin:SuperSecureProductionPassword101!@postgres-0.postgres.observability.svc.cluster.local:5432/metrics_metadata"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-env-config
  namespace: observability
data:
  ALLOWED_ORIGIN: "https://observability.example.com"
  WEB_CONCURRENCY: "4"
  PORT: "8000"
  ENABLE_OBSERVABILITY: "true"
  PYROSCOPE_SERVER: "http://alloy:4040?format=pyroscope"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-env-config
  namespace: observability
data:
  VITE_ENABLE_TRACKING: "true"
  VITE_APP_VERSION: "1.0.0"
  VITE_API_BASE_URL: "https://observability.example.com"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: observability
data:
  config.alloy: |
    // Distributed cluster mode parsing
    argument "cluster_enabled" {
      default = true
    }

    otelcol.receiver.otlp "default" {
      grpc { endpoint = "0.0.0.0:4317" }
      http { endpoint = "0.0.0.0:4318" }

      output {
        metrics = [otelcol.exporter.prometheus.to_mimir.input]
      }
    }

    otelcol.exporter.prometheus "to_mimir" {
      forward_to = [prometheus.remote_write.mimir.receiver]
    }

    prometheus.remote_write "mimir" {
      endpoint { 
        url = "https://mimir-production.example.com/api/v1/push" 
      }
    }
---
# ==============================================================================
# STATEFUL WORKLOAD: POSTGRESQL (HA Configured)
# ==============================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: observability
spec:
  serviceName: "postgres"
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: docker.io/library/postgres:16.2-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_DB
          ports:
            - containerPort: 5432
              name: postgres
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "$(POSTGRES_USER)", "-d", "$(POSTGRES_DB)"]
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: "premium-rwo" # Swapped to explicit high-performance IO block storage
        resources:
          requests:
            storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: observability
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
---
# ==============================================================================
# GRAFANA ALLOY COLLECTOR (High-Availability Clustered Agent Deployment)
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alloy
  namespace: observability
spec:
  replicas: 3 # Set to minimum of 3 for quorum clustering
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: alloy
  template:
    metadata:
      labels:
        app: alloy
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [alloy]
              topologyKey: "kubernetes.io/hostname"
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: alloy
          image: grafana/alloy:v1.1.1
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          args:
            - run
            - --stability.level=public-preview
            - /etc/alloy/config.alloy
            - --storage.path=/var/lib/alloy/data
            - --cluster.enabled=true
            - --cluster.join-addresses=alloy.observability.svc.cluster.local:12345
          ports:
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
            - containerPort: 4040
              name: profiling
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "1000m"
          volumeMounts:
            - name: config-volume
              mountPath: /etc/alloy
            - name: alloy-storage
              mountPath: /var/lib/alloy/data
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 12345
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: config-volume
          configMap:
            name: alloy-config
        - name: alloy-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: alloy
  namespace: observability
spec:
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: profiling
      port: 4040
      targetPort: 4040
  selector:
    app: alloy
---
# ==============================================================================
# APPLICATION WORKLOADS (With High Availability Scheduling rules)
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: observability
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [backend]
                topologyKey: "kubernetes.io/hostname"
      securityContext:
        runAsNonRoot: true
      containers:
        - name: backend
          image: moreskylab/backend:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://alloy:4317"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DATABASE_URL
          envFrom:
            - configMapRef:
                name: backend-env-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: observability
spec:
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: observability
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [frontend]
                topologyKey: "kubernetes.io/hostname"
      securityContext:
        runAsNonRoot: true
      containers:
        - name: frontend
          image: moreskylab/frontend:1.0.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: frontend-env-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: observability
spec:
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: frontend
---
# ==============================================================================
# ENVOY GATEWAY EDGE ROUTING (Production Ready TLS Gateway API)
# ==============================================================================
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: external-envoy-gateway
  namespace: observability
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: observability-tls-cert
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: application-routes
  namespace: observability
spec:
  parentRefs:
    - name: external-envoy-gateway
      sectionName: https # Attach routes exclusively to the secured TLS listener
  hostnames:
    - "observability.example.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: backend
          port: 8000
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 8080

