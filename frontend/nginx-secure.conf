server {
    # Dynamic port assignment via cloud-native environment variable
    listen 8080;
    server_name localhost;

    # 1. Information Leakage Prevention
    server_tokens off;

    # 2. Hardened Production Security Headers
    # UPDATED: Added connect-src to allow the browser to send data to your local/production API and telemetry backends.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:8000 http://localhost:8080; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # NEW ACTION: Backend API Proxy Hook
    # Catches relative browser requests and targets the backend container endpoint
    location /items {
        proxy_pass http://backend:8000/items;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # NEW ACTION: Telemetry Gateway Routing Proxy
    # Catches browser telemetry packets and targets Grafana Alloy's HTTP receiver port (4318)
    location /v1/traces {
        # Check if incoming request is CORS preflight. Handle it gracefully if Alloy doesn't.
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,traceparent,tracestate' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://alloy:4318/v1/traces;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded-for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. Cache-Control Optimization for Vite Builds
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
        
        # UPDATED: Re-applied scoped CSP rule inside location context block
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:8000 http://localhost:8080; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }

    # Cache Vite hashed static assets (js, css, images) aggressively for 1 year
    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        
        # UPDATED: Re-applied scoped CSP rule inside asset context block
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' http://localhost:8000 http://localhost:8080; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    }

    # Cloud-Native Health Check Routing Hook
    location /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    # 4. Custom Local Error Routing Engine
    error_page 400 401 403 404 500 502 503 504 /error.html;
    location = /error.html {
        root   /usr/share/nginx/html;
        internal;
    }
}
