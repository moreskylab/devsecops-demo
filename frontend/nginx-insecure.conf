server {
    listen 8080;
    server_name localhost;

    # Dynamic Docker/Podman runtime DNS tracker
    resolver 127.0.0.11 valid=5s;

    # 1. Permissive CSP and Security Headers for Demo
    add_header Content-Security-Policy "default-src 'self' *; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline';" always;
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Headers "Content-Type, traceparent, tracestate" always;

    # 2. Serve Frontend Vite Application Build Assets
    location / {
        root      /usr/share/nginx/html;
        index     index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 3. Forward API Traffic to Backend Container
    location /items {
        set $backend_host "backend:8000";
        
        # FIX: Remove the hardcoded scheme and $request_uri duplication.
        # This forces Nginx to map /items cleanly to the backend container's /items
        proxy_pass http://$backend_host;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. Forward Telemetry Traffic to Grafana Alloy Container
    location /v1/traces {
        set $alloy_host "alloy:4318";
        
        # FIX: Standardized proxy_pass variable interpolation
        proxy_pass http://$alloy_host;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
